<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir o site em vários dispositivos diferentes ou simplemente aumente e diminua o tamanho do seu navegador</p>

    <picture>
        <source media="(max-width: 1000px)" srcset="img/img002.xcf" type="image/xcf">
        <img src="img/img003.xcf" alt="Imagem Flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    
    <audio src="audio/Intergalactic - Alex Jones _ Xander Jones.mp3" controls></audio>
    <br>
    <audio preload="metadata" controls>
        <source src="audio/Intergalactic - Alex Jones _ Xander Jones.mp3" type="audio/mpeg">
        <source src="audio/Intergalactic - Alex Jones _ Xander Jones.mp3" type="audio/mp3">
    </audio>
    
</body>
</html>
